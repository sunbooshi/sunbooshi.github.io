name: Deploy GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            next/package-lock.json
            blog/package-lock.json

      # ---------- Next.js ----------
      - name: Install Next dependencies
        working-directory: next
        run: npm ci

      - name: Build Next
        working-directory: next
        run: npm run build

      # ---------- Hexo ----------
      - name: Install Hexo dependencies
        working-directory: blog
        run: npm ci

      - name: Build Hexo
        working-directory: blog
        run: npm run build

      # ---------- Merge ----------
      - name: Prepare Pages
        run: |
          rm -rf docs
          mkdir docs

          cp -R next/out/* docs/

          mkdir -p docs/blog
          cp -R blog/public/* docs/blog/

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest

    needs: build

    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4